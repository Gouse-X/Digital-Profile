<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: white;
            }
            .form {
                background: rgb(173, 210, 255);
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 350px;
                text-align: center;
            }
            
            .form h1 {
                margin-bottom: 30px;
                color:#2c3e50;;
            }
            
            .form input {
                width: 100%;
                padding: 15px;
                margin: 10px 0;
                border: 2px solid #ddd;
                border-radius: 30px;
                box-sizing: border-box;
            }
            
            .form button {
                width: 25%;
                padding: 12px;
                background: #1383fa;
                color: white;
                border: 2px solid white;
                border-radius: 30px;
                cursor: pointer;
                margin-top: 15px;
            }
            .form button:hover{
                background: #0051a7;
            }
        </style>
    </head>
    <body>
        <form class="form">
            <h1>Enter Your Details To Access Portfolio</h1>
            <input type="text" name="Name" placeholder="Name" required>
            <input type="email" name="Email" placeholder="Email" required>
            <button type="submit" class="button">Access</button>
        </form>
    </body>
    <script>
        document.querySelector('.form').addEventListener('submit',function(e){
            e.preventDefault();
            fetch('https://formspree.io/f/xbdgjkna',{
                method:'POST',
                body:new FormData(this),
                headers:{Accept:'application/json'}
            }).catch(error=>{
                console.log('Form submission done');
            });
            window.location.href='portfolio.html';
        });
    </script>
</html>
